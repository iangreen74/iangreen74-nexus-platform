AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Restores the S3 sink for the account-security-trail CloudTrail.
  Trail had been failing S3 delivery since 2025-09-27 (NoSuchBucket on
  account-security-cloudtrail-dc5f419b, which was deleted out from under
  the trail's reference and not codified). Original bucket name preserved
  so the trail itself does not need reconfiguration. Surfaced by the
  Phase 0b.5 substrate-truth check on 2026-04-26.

Resources:
  AccountSecurityCloudtrailBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: account-security-cloudtrail-dc5f419b
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacierThenExpire
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 90
            ExpirationInDays: 730
          - Id: ExpireIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      Tags:
        - Key: Purpose
          Value: cloudtrail-sink
        - Key: Trail
          Value: account-security-trail
        - Key: RestoredBy
          Value: PR-cloudtrail-sink-restoration

  AccountSecurityCloudtrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AccountSecurityCloudtrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt AccountSecurityCloudtrailBucket.Arn
            Condition:
              StringEquals:
                aws:SourceArn: !Sub "arn:aws:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/account-security-trail"
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${AccountSecurityCloudtrailBucket.Arn}/AWSLogs/${AWS::AccountId}/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
                aws:SourceArn: !Sub "arn:aws:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/account-security-trail"

Outputs:
  BucketName:
    Value: !Ref AccountSecurityCloudtrailBucket
    Export:
      Name: AccountSecurityCloudtrailBucket
  BucketArn:
    Value: !GetAtt AccountSecurityCloudtrailBucket.Arn
    Export:
      Name: AccountSecurityCloudtrailBucketArn
