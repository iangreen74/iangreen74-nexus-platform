AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Overwatch V2 — IAM reasoner role. Read-only AWS access scoped to
  services the reasoner observes. Assumable only by ECS tasks in the
  overwatch-platform cluster. Mutations go through the separate
  overwatch-v2-mutation-role (template 04). Spec ref §9.2.

Resources:

  ReasonerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: overwatch-v2-reasoner-role
      Description: Read-only role for the Overwatch V2 reasoner running on ECS.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              # SourceAccount restricts assumption to this account (basic
              # confused-deputy protection). aws:SourceArn was attempted but
              # ECS does not populate that context key by default during task
              # role assumption, so any ArnLike on it fails. Empirically
              # verified 2026-04-25: with ArnLike on SourceArn, ECS returns
              # "unable to assume role"; SourceAccount-only works.
              StringEquals:
                aws:SourceAccount: "418295677815"
      Policies:
        - PolicyName: OverwatchV2ReasonerReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              # Compute and container observability
              - Sid: EcsRead
                Effect: Allow
                Action:
                  - ecs:Describe*
                  - ecs:List*
                Resource: "*"
              - Sid: EcrRead
                Effect: Allow
                Action:
                  - ecr:Describe*
                  - ecr:List*
                  - ecr:GetRepositoryPolicy
                  - ecr:GetLifecyclePolicy
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: "*"
              - Sid: Ec2Read
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"

              # Database and infra describe
              - Sid: RdsRead
                Effect: Allow
                Action:
                  - rds:Describe*
                  - rds:ListTagsForResource
                Resource: "*"
              - Sid: CloudFormationRead
                Effect: Allow
                Action:
                  - cloudformation:Describe*
                  - cloudformation:List*
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                Resource: "*"
              - Sid: StepFunctionsRead
                Effect: Allow
                Action:
                  - states:Describe*
                  - states:List*
                  - states:GetExecutionHistory
                Resource: "*"
              - Sid: LambdaRead
                Effect: Allow
                Action:
                  - lambda:Get*
                  - lambda:List*
                Resource: "*"
              - Sid: ElbRead
                Effect: Allow
                Action:
                  - elasticloadbalancing:Describe*
                Resource: "*"

              # Logs and quotas
              - Sid: LogsRead
                Effect: Allow
                Action:
                  - logs:Describe*
                  - logs:Get*
                  - logs:FilterLogEvents
                  - logs:StartQuery
                  - logs:StopQuery
                  - logs:GetQueryResults
                Resource: "*"
              - Sid: ServiceQuotasRead
                Effect: Allow
                Action:
                  - servicequotas:Get*
                  - servicequotas:List*
                Resource: "*"

              # Secrets Manager — overwatch-v2/* namespace only
              - Sid: SecretsReadOverwatchNamespaceOnly
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - "arn:aws:secretsmanager:us-east-1:418295677815:secret:overwatch-v2/*"

              # Neptune Analytics — read-only on overwatch-graph and the existing aria-platform graph
              - Sid: NeptuneAnalyticsReadOwnAndAriaGraph
                Effect: Allow
                Action:
                  - neptune-graph:GetGraph
                  - neptune-graph:ListGraphs
                  - neptune-graph:ListTagsForResource
                  - neptune-graph:ReadDataViaQuery
                  - neptune-graph:GetGraphSummary
                  - neptune-graph:ListGraphSnapshots
                  - neptune-graph:GetQueryStatus
                Resource: "*"

              # KMS — HMAC sign + verify on the approval-token key only.
              # Phase 1.5.2 (2026-04-26): renamed Sid + corrected actions.
              # Pre-1.5.2 this granted `kms:Verify` (asymmetric signature verify),
              # which is a dead grant against an HMAC_256 / GENERATE_VERIFY_MAC key
              # — Phase 1.5.1's smoke test caught the asymmetry when verify_token()
              # failed AccessDenied at AWS. `kms:GenerateMac` was previously
              # granted only in 05-kms-approval-key.yml's key resource policy
              # (Sid ReasonerRoleSign) — adding it here too makes 03's role
              # policy self-contained for HMAC sign+verify; 05's grant becomes
              # redundant defense-in-depth and is a follow-up cleanup candidate.
              # `kms:DescribeKey` is defensive — some SDK paths call it for key
              # metadata before sign/verify; cost is zero, prevents the next surprise.
              - Sid: KmsHmacApprovalToken
                Effect: Allow
                Action:
                  - kms:GenerateMac
                  - kms:VerifyMac
                  - kms:DescribeKey
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ResourceAliases: "alias/overwatch-v2-approval-token"

              # CloudTrail — read for audit
              - Sid: CloudTrailRead
                Effect: Allow
                Action:
                  - cloudtrail:LookupEvents
                  - cloudtrail:Describe*
                  - cloudtrail:Get*
                  - cloudtrail:List*
                Resource: "*"

              # ALB access logs — read S3 objects for both ALB log buckets
              # so read_alb_logs can fetch + parse. Phase 0b adds the V2
              # bucket; the legacy bucket is preserved here while
              # platform.vaultscaler.com traffic continues flowing through
              # aria-platform-alb pre-destruction (becomes moot when the
              # destruction prompt fires; harmless until then).
              - Sid: S3ReadAlbAccessLogs
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::overwatch-v2-alb-logs-418295677815
                  - arn:aws:s3:::overwatch-v2-alb-logs-418295677815/*
                  - arn:aws:s3:::aria-platform-alb-logs-418295677815
                  - arn:aws:s3:::aria-platform-alb-logs-418295677815/*

              # Operator-substrate audit — Phase 0b wires the registry's
              # _emit_audit hook to /overwatch-v2/operator-substrate-audit
              # so every tool dispatch has a structured record.
              - Sid: OperatorSubstrateAuditWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - arn:aws:logs:us-east-1:418295677815:log-group:/overwatch-v2/operator-substrate-audit:*

              # Echo mutations audit — Phase 1 wires every dispatch attempt
              # against requires_approval=True tools (regardless of outcome:
              # rejected_no_token, rejected_bad_token, success, tool_error)
              # to /overwatch-v2/echo-mutations (365-day retention).
              - Sid: EchoMutationsAuditWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - arn:aws:logs:us-east-1:418295677815:log-group:/overwatch-v2/echo-mutations:*

              # Bedrock — Echo's reasoner invokes Claude via Converse + InvokeModel.
              # Without this, every chat fails before tool dispatch.
              - Sid: BedrockInvoke
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource: "*"

              # CloudWatch metrics — read_overwatch_metrics tool (Tool 6)
              # reads the Overwatch/V2 namespace for reasoner introspection.
              - Sid: CloudWatchMetricsRead
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                Resource: "*"

              # CodeBuild read — Phase 1 read_customer_pipeline tool reads
              # CodeBuild projects + builds for tenant deploy history.
              - Sid: CodeBuildRead
                Effect: Allow
                Action:
                  - codebuild:BatchGetProjects
                  - codebuild:ListBuilds
                  - codebuild:ListBuildsForProject
                  - codebuild:BatchGetBuilds
                  - codebuild:ListProjects
                Resource: "*"

              # Resource Groups Tagging — Phase 1 tools resolve a tenant's
              # resources by TenantId tag rather than naming (one tenant
              # can have multiple clusters with different name patterns;
              # the TenantId tag is the canonical link).
              - Sid: ResourceGroupsTaggingRead
                Effect: Allow
                Action:
                  - tag:GetResources
                Resource: "*"

              # Cross-tenant audit log writes — Phase 1 guardrail 3.
              # Scoped to the dedicated audit log group only; the role
              # cannot write to any other log destination.
              - Sid: CrossTenantAuditLogWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - "arn:aws:logs:us-east-1:418295677815:log-group:/overwatch-v2/cross-tenant-audit:*"

        # Cross-namespace dependency: the daemon's pipeline-polling loop
        # in nexus.capabilities.forgewing_api reads forgescaler/api to
        # authenticate against api.forgescaler.com. This is intentional
        # cross-namespace coupling (Forgewing API auth from the
        # Overwatch reasoner role), so it lives as its own named policy
        # rather than expanding the overwatch-v2/* wildcard. Methodology
        # L24: cross-namespace IAM dependencies are explicit, not buried.
        - PolicyName: SecretsReadForgescalerApi
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadForgescalerApiSecret
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                # Trailing * because Secrets Manager appends a 6-char
                # disambiguator suffix (e.g. forgescaler/api-waftLx).
                Resource: "arn:aws:secretsmanager:us-east-1:418295677815:secret:forgescaler/api*"

      Tags:
        - Key: Purpose
          Value: overwatch-v2-reasoner
        - Key: Stack
          Value: overwatch-v2-iam-reasoner

Outputs:
  ReasonerRoleArn:
    Value: !GetAtt ReasonerRole.Arn
    Export:
      Name: OverwatchV2ReasonerRoleArn
  ReasonerRoleName:
    Value: !Ref ReasonerRole
    Export:
      Name: OverwatchV2ReasonerRoleName
