AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Overwatch V2 — Secrets Manager namespace overwatch-v2/*.
  Three secrets: postgres-master (generated), github-pat (placeholder),
  anthropic-fallback (placeholder reserved for non-Bedrock auth).
  Spec ref §17.7. Day 1 foundation.

Resources:

  PostgresMasterSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: overwatch-v2/postgres-master
      Description: RDS Postgres master credentials for overwatch-postgres (consumed by 02-rds-postgres stack).
      GenerateSecretString:
        SecretStringTemplate: '{"username":"overwatch_admin"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'''
      Tags:
        - Key: Purpose
          Value: overwatch-v2-postgres
        - Key: Stack
          Value: overwatch-v2-secrets

  GitHubPatSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: overwatch-v2/github-pat
      Description: GitHub Personal Access Token for Overwatch V2 (placeholder; populate via update-secret post-deploy).
      SecretString: '{"placeholder":"populate-via-aws-secretsmanager-update-secret"}'
      Tags:
        - Key: Purpose
          Value: overwatch-v2-github
        - Key: Stack
          Value: overwatch-v2-secrets

  AnthropicFallbackSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: overwatch-v2/anthropic-fallback
      Description: Reserved for non-Bedrock Anthropic auth (currently unused; placeholder).
      SecretString: '{"placeholder":"reserved"}'
      Tags:
        - Key: Purpose
          Value: overwatch-v2-anthropic-fallback
        - Key: Stack
          Value: overwatch-v2-secrets

Outputs:
  PostgresMasterSecretArn:
    Value: !Ref PostgresMasterSecret
    Export:
      Name: OverwatchV2PostgresMasterSecretArn
  GitHubPatSecretArn:
    Value: !Ref GitHubPatSecret
    Export:
      Name: OverwatchV2GitHubPatSecretArn
  AnthropicFallbackSecretArn:
    Value: !Ref AnthropicFallbackSecret
    Export:
      Name: OverwatchV2AnthropicFallbackSecretArn
