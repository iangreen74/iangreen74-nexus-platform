name: NEXUS Platform CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPO: 418295677815.dkr.ecr.us-east-1.amazonaws.com/nexus-platform
  ECS_CLUSTER: overwatch-platform
  ECS_SERVICE: aria-console
  HEALTH_URL: https://platform.vaultscaler.com/health

# Python files exempt from the 200-line invariant. These are established
# operational modules that predate the invariant. Additions to this list
# require explicit review — the goal is for this list to shrink over time,
# not grow.
#
#   nexus/overwatch_graph.py  ~1000 lines; contains 20+ record_* wrappers
#                             + MERGE helpers. Splitting would fragment
#                             the canonical Neptune write API.

jobs:
  invariant-checks:
    runs-on: [self-hosted, nexus-runner]
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Check region invariant
        run: |
          VIOLATIONS=$(grep -rn "us-west\|us-east-2\|eu-\|ap-\|region.*=.*[\"']us-" nexus/ --include="*.py" 2>/dev/null | grep -v "us-east-1" | grep -v "^#" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "REGION INVARIANT VIOLATION:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "Region invariant: PASS"

      - name: Check file size invariant (200-line limit with documented exemptions)
        run: |
          EXEMPT="nexus/overwatch_graph.py"
          OVER=$(find nexus/ -name "*.py" -type f | while read f; do
            case " $EXEMPT " in *" $f "*) continue ;; esac
            lines=$(wc -l < "$f")
            [ "$lines" -gt 200 ] && echo "$f: $lines lines"
          done)
          if [ -n "$OVER" ]; then
            COUNT=$(echo "$OVER" | wc -l)
            echo "::warning::File size invariant: $COUNT non-exempt file(s) over 200 lines"
            echo ""
            echo "Files over 200 lines (sorted largest first):"
            echo "$OVER" | sort -t: -k2 -n -r
            echo ""
            echo "Exempt list: $EXEMPT"
            echo ""
            echo "=============================================================="
            echo "NOTE: This invariant is currently a WARNING, not a failure."
            echo "  - Nexus modularization scheduled for Sprint 13."
            echo "  - See docs/NEXUS_ROUTES_REFACTOR_PLAN.md for the plan."
            echo "  - Target: exempt list <= 5 files with written rationale."
            echo "=============================================================="
          else
            echo "File size invariant: PASS"
          fi

      - name: Check no hardcoded secrets
        run: |
          SECRETS=$(grep -rPn "AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}" nexus/ --include="*.py" 2>/dev/null || true)
          if [ -n "$SECRETS" ]; then
            echo "SECRET INVARIANT VIOLATION:"
            echo "$SECRETS"
            exit 1
          fi
          echo "Secret invariant: PASS"

      - name: Critical modules import cleanly
        run: |
          python3 -c "
          from nexus.overwatch_graph import record_event, record_pipeline_event, _create_node
          from nexus.sensors.pipeline_event_sensor import poll_pipeline_events
          from nexus.ontology import service, schema, routes, graph
          from nexus.ontology.service import propose_object, update_object
          from nexus.server import app
          print('All critical imports OK')
          "

  test:
    runs-on: [self-hosted, nexus-runner]
    timeout-minutes: 10
    needs: invariant-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio
      - run: NEXUS_MODE=local python -m pytest tests/ -x -q --tb=short

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, nexus-runner]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin \
            418295677815.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build with commit SHA
        run: |
          GIT_SHA=${GITHUB_SHA::7}
          docker build --build-arg GIT_SHA=$GIT_SHA -t nexus-platform:latest .
          docker tag nexus-platform:latest $ECR_REPO:latest
          docker tag nexus-platform:latest $ECR_REPO:$GIT_SHA
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV

      - name: Push to ECR
        run: |
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:$GIT_SHA

      - name: Deploy to ECS (progressive, circuit breaker enabled)
        run: |
          python3 -c "
          import boto3
          ecs = boto3.client('ecs', region_name='us-east-1')
          ecs.update_service(
              cluster='$ECS_CLUSTER',
              service='$ECS_SERVICE',
              forceNewDeployment=True,
              deploymentConfiguration={
                  'deploymentCircuitBreaker': {'enable': True, 'rollback': True},
                  'maximumPercent': 200,
                  'minimumHealthyPercent': 100,
              },
          )
          print(f'Progressive deploy started: $GIT_SHA to $ECS_SERVICE')
          print('Circuit breaker enabled — auto-rollback on task failure')
          "

      - name: Wait for stable (REAL gate, not continue-on-error)
        run: |
          echo "Waiting for $ECS_SERVICE to reach stable state..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
          echo "Service stable on $GIT_SHA"

      - name: Verify health (fails workflow on non-200)
        run: |
          echo "Waiting for health endpoint..."
          sleep 10
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed after $((i*5+10))s"
              BODY=$(curl -s --max-time 5 "$HEALTH_URL" 2>/dev/null || echo "")
              echo "Body: $BODY"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 5s"
            sleep 5
          done
          echo "::error::Health check failed after 70s — circuit breaker should have rolled back"
          exit 1
